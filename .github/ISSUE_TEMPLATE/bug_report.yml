name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "## HumTrack Bug Report"
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Load video...\n2. Click...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HumTrack Version
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Calibration
        - Tracking
        - Physics/Gait
        - Multi-Camera
        - Live Capture
        - Export
        - UI
        - Other
    validations:
      required: true
